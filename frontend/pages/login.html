<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - CNC Smart System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Be+Vietnam+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/isa101.css">
    <style>
        /* ── LOGIN PAGE OVERRIDES ── */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Blueprint grid nền mờ phía sau content */
        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            padding: 32px 28px;
        }

        /* Blueprint engineering grid overlay */
        .content::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(30,95,168,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30,95,168,0.06) 1px, transparent 1px),
                linear-gradient(rgba(30,95,168,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30,95,168,0.03) 1px, transparent 1px);
            background-size: 80px 80px, 80px 80px, 20px 20px, 20px 20px;
            pointer-events: none;
            z-index: 0;
        }

        /* Login card */
        .login-card {
            background: var(--gray-card);
            border: 1px solid var(--gray-border);
            border-radius: 6px;
            padding: 0;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10);
            animation: fadeUp 0.4s ease both;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* Card header stripe */
        .login-card-header {
            background: var(--cyan-portal);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .login-lock-icon {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .login-lock-icon svg {
            width: 18px;
            height: 18px;
            stroke: white;
            fill: none;
        }

        .login-title {
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            font-weight: 700;
            color: white;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1.35;
        }

        .login-subtitle {
            font-size: 9px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* Card body */
        .login-body {
            padding: 28px 32px 20px;
        }

        .form-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .form-row label {
            font-size: 11px;
            color: var(--text-secondary);
            width: 80px;
            font-weight: 700;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            font-family: 'Orbitron', monospace;
            font-size: 9px;
        }

        .form-row .input-wrap {
            flex: 1;
            position: relative;
        }

        .form-row input {
            width: 100%;
            background: var(--gray-bg);
            border: 1px solid var(--gray-border);
            border-radius: 3px;
            padding: 9px 12px 9px 34px;
            color: var(--text-primary);
            font-size: 12px;
            font-family: 'Be Vietnam Pro', sans-serif;
            outline: none;
            transition: var(--transition);
        }

        .form-row input:focus {
            border-color: var(--cyan-portal);
            background: white;
            box-shadow: 0 0 0 3px var(--cyan-glow);
        }

        .input-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 13px;
            pointer-events: none;
        }

        .error-msg {
            color: var(--status-alarm);
            font-size: 11px;
            text-align: center;
            margin-bottom: 12px;
            min-height: 16px;
            font-weight: 500;
            padding: 0 4px;
        }

        .btn-enter {
            display: block;
            width: 100%;
            background: var(--cyan-portal);
            border: none;
            color: white;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            padding: 12px 20px;
            border-radius: 3px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-enter:hover {
            background: var(--cyan-dark);
            box-shadow: 0 4px 16px rgba(30,95,168,0.3);
        }

        .btn-enter:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Status bar dưới card */
        .login-status-bar {
            display: flex;
            border-top: 1px solid var(--gray-border);
            background: var(--gray-sidebar);
        }

        .login-status-item {
            flex: 1;
            padding: 7px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 8.5px;
            color: var(--text-muted);
            font-family: monospace;
            border-right: 1px solid var(--gray-border);
            letter-spacing: 0.3px;
        }

        .login-status-item:last-child {
            border-right: none;
        }

        .status-dot-green {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--status-active);
            animation: pulse 2s infinite;
            flex-shrink: 0;
        }

        .status-dot-lock {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--cyan-portal);
            flex-shrink: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .login-body { padding: 20px 20px 16px; }
            .login-status-item { font-size: 7.5px; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="logo-bk">
        <img src="/static/images/hust_logo.png" alt="ĐHBK Hà Nội" onerror="this.src='https://via.placeholder.com/55x55?text=HUST'">
        <div class="logo-bk-text">ĐH Bách Khoa<br>Hà Nội</div>
    </div>
    <div class="header-center">
        <div class="main-title">TÍNH TOÁN, THIẾT KẾ HỆ THỐNG ĐIỀU KHIỂN<br>MÁY CNC ĐỂ BÀN TỰ CHỦ THÔNG MINH</div>
        <div class="sub-title">GVHD: LÊ GIANG NAM — APS LAB — HUST</div>
    </div>
    <img src="/static/images/vimes_logo.png" alt="Vimes Lab" style="height:55px; width:auto;" onerror="this.src='https://via.placeholder.com/55x55?text=V'">
</header>

<!-- LOGIN FORM -->
<main class="content">
    <div class="login-card">

        <!-- Card header with lock icon -->
        <div class="login-card-header">
            <div class="login-lock-icon">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <div>
                <div class="login-title">ĐĂNG NHẬP HỆ THỐNG</div>
                <div class="login-subtitle">SYSTEM LOGIN — INDUSTRIAL HMI</div>
            </div>
        </div>

        <!-- Form body -->
        <div class="login-body">
            <form id="loginForm">
                <div class="form-row">
                    <label for="username">USER</label>
                    <div class="input-wrap">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" name="username" placeholder="Tên đăng nhập"
                               autocomplete="username" spellcheck="false" required>
                    </div>
                </div>
                <div class="form-row">
                    <label for="password">PASSWORD</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="Mật khẩu"
                               autocomplete="current-password" required>
                    </div>
                </div>

                <div class="error-msg" id="errMsg"></div>

                <button type="submit" class="btn-enter" id="btnEnter">
                    <span>ENTER</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>
        </div>

        <!-- Status bar -->
        <div class="login-status-bar">
            <div class="login-status-item">
                <div class="status-dot-green"></div>
                SYSTEM READY
            </div>
            <div class="login-status-item">
                <div class="status-dot-lock"></div>
                SSL/TLS ENCRYPTED
            </div>
            <div class="login-status-item">
                v1.0.0 | 20/05/2025
            </div>
        </div>

    </div>
</main>

<script type="module">
import { auth } from '/static/js/auth.js';

const form  = document.getElementById('loginForm');
const err   = document.getElementById('errMsg');
const btn   = document.getElementById('btnEnter');

if (auth.isLoggedIn()) {
    window.location.href = '/';
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();

    if (!user || !pass) {
        err.textContent = '⚠ Vui lòng nhập đầy đủ thông tin.';
        return;
    }

    btn.disabled = true;
    err.textContent = '';

    try {
        await auth.login(user, pass);
        window.location.href = '/';
    } catch (ex) {
        err.textContent = ex.status === 401
            ? '⚠ Sai tên đăng nhập hoặc mật khẩu.'
            : `⚠ ${ex.message || 'Đăng nhập thất bại.'}`;
        btn.disabled = false;
    }
});

document.querySelectorAll('input').forEach(el => {
    el.addEventListener('input', () => { err.textContent = ''; });
});

document.getElementById('username').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('password').focus(); }
});

// Load theme từ localStorage
function loadThemeFromLocal() {
    const saved = localStorage.getItem('cnc_theme');
    if (saved) {
        try {
            const theme = JSON.parse(saved);
            const root = document.documentElement;
            if (theme.headerBg)   root.style.setProperty('--gray-header', theme.headerBg);
            if (theme.cardBg)     root.style.setProperty('--gray-card', theme.cardBg);
            if (theme.sidebarBg)  root.style.setProperty('--gray-sidebar', theme.sidebarBg);
            if (theme.accentColor)root.style.setProperty('--cyan-portal', theme.accentColor);
            if (theme.borderColor)root.style.setProperty('--gray-border', theme.borderColor);
            if (theme.textColor)  root.style.setProperty('--text-primary', theme.textColor);
        } catch(e) {}
    }
}

window.addEventListener('storage', (event) => {
    if (event.key === 'cnc_theme' && event.newValue) {
        try {
            const theme = JSON.parse(event.newValue);
            const root = document.documentElement;
            if (theme.headerBg)    root.style.setProperty('--gray-header', theme.headerBg);
            if (theme.sidebarBg)   root.style.setProperty('--gray-sidebar', theme.sidebarBg);
            if (theme.accentColor) root.style.setProperty('--cyan-portal', theme.accentColor);
            if (theme.borderColor) root.style.setProperty('--gray-border', theme.borderColor);
            if (theme.textColor)   root.style.setProperty('--text-primary', theme.textColor);
        } catch(e) {}
    }
});

loadThemeFromLocal();
</script>

</body>
</html>
